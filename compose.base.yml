services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: labpass
      POSTGRES_DB: labdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labuser -d labdb"]
      interval: 3s
      timeout: 2s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./app
    environment:
      DB_HOST: db        # refers to the service name db defined above
      DB_PORT: 5432
      DB_USER: labuser
      DB_PASSWORD: labpass
      DB_NAME: labdb
      PORT: 3000
      BIND_ADDRESS: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  db_data:
